# SCP Foundation Theme for Kitty

# Cursor
cursor #ff4500
cursor_text_color #0d0d0d

# Background/Foreground
background #0d0d0d
foreground #ffffff
selection_background #ff4500
selection_foreground #000000

# Window
background_opacity 0.95
window_padding_width 10

# Tab bar (if you use tabs)
tab_bar_style powerline
active_tab_background #ff4500
active_tab_foreground #000000
inactive_tab_background #1a1a1a
inactive_tab_foreground #cccccc

# Black
color0 #1a1a1a
color8 #4a4a4a

# Red
color1 #ff0000
color9 #ff4500

# Green
color2  #00ff00
color10 #00ff88

# Yellow
color3  #ffaa00
color11 #ffdd00

# Blue
color4  #0088ff
color12 #00aaff

# Magenta
color5  #ff00ff
color13 #ff88ff

# Cyan
color6  #00ffff
color14 #88ffff

# White
color7  #cccccc
color15 #ffffff
